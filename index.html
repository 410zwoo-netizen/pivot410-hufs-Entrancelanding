  <style>/* ==========================================================
   PIVOT410 STUDIO · 외대점 입시반 랜딩
   Brand system from PIVOT 진단서
   ========================================================== */

:root {
  --navy: #1A2847;
  --navy-deep: #0E1730;
  --navy-surface: #223158;
  --navy-line: #2E3F66;
  --gold: #F5C84B;
  --gold-soft: #FBE6A4;
  --white: #FAFAFA;
  --paper: #F5F1E8;
  --paper-line: #E5DECE;
  --red: #C8202C;
  --gray: #888888;
  --gray-soft: #B8BCC8;

  --max: 1280px;
  --gutter: 80px;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

@font-face {
  font-family: 'Pretendard Variable';
  font-weight: 45 920;
  font-style: normal;
  font-display: swap;
  src: local('Pretendard Variable');
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--navy);
  color: var(--white);
  font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif;
  font-feature-settings: "ss06", "ss07";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.55;
  letter-spacing: -0.01em;
  overflow-x: hidden;
}

img { display: block; max-width: 100%; }

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

/* ---------- Type primitives ---------- */
.eyebrow {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "—";
  color: var(--red);
  font-weight: 700;
  letter-spacing: 0;
}

.eyebrow.on-paper { color: var(--navy); }
.eyebrow.on-paper::before { color: var(--red); }

.h1 {
  font-size: clamp(40px, 6.2vw, 88px);
  line-height: 1.05;
  letter-spacing: -0.035em;
  font-weight: 800;
  margin: 0;
  text-wrap: balance;
}

.h2 {
  font-size: clamp(32px, 4vw, 56px);
  line-height: 1.12;
  letter-spacing: -0.03em;
  font-weight: 800;
  margin: 0;
  text-wrap: balance;
}

.lead {
  font-size: clamp(16px, 1.25vw, 19px);
  color: var(--gray-soft);
  line-height: 1.7;
  margin: 0;
  max-width: 60ch;
  text-wrap: pretty;
}

.lead.on-paper { color: #5A6478; }

.mono {
  font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  letter-spacing: 0.02em;
}

/* ---------- Section ---------- */
.section {
  padding: clamp(80px, 10vw, 140px) var(--gutter);
  position: relative;
}
.section-inner { max-width: var(--max); margin: 0 auto; }

.section-head {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: clamp(48px, 6vw, 80px);
}

/* ---------- Reveal animation ---------- */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  will-change: opacity, transform;
}
.reveal.in {
  opacity: 1;
  transform: none;
}
.reveal[data-delay="1"] { transition-delay: 0.08s; }
.reveal[data-delay="2"] { transition-delay: 0.16s; }
.reveal[data-delay="3"] { transition-delay: 0.24s; }
.reveal[data-delay="4"] { transition-delay: 0.32s; }

/* ==========================================================
   HUB BAR · 허브(link 페이지)로 복귀 — 본부 표준 복귀 바
   ========================================================== */
:root { --hub-h: 40px; } /* 복귀 바 높이. 헤더/hero를 이만큼 내림 */

.hub-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 101; /* 헤더(100)보다 위 — 항상 맨 위에 고정 */
  height: var(--hub-h);
  background: var(--navy-deep);
  border-bottom: 1px solid var(--navy-line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 var(--gutter);
}
.hub-bar a.hub-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--gold);
  transition: opacity 0.2s var(--ease);
}
.hub-bar a.hub-back:hover { opacity: 0.75; }
.hub-bar .hub-list {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--gray-soft);
}
/* 헤더를 복귀 바 높이만큼 아래로 — 겹침 방지 (원본 .site-header top 값에 반영) */
/* hero 첫 화면도 복귀 바 높이만큼 보정 */
.hero { padding-top: calc(140px + var(--hub-h)); }
@media (max-width: 380px) {
  .hub-bar .hub-list { display: none; } /* 좁은 화면에선 우측 안내 숨김 */
}

/* ==========================================================
   HEADER
   ========================================================== */
.site-header {
  position: fixed;
  top: var(--hub-h); left: 0; right: 0;
  z-index: 100;
  padding: 18px var(--gutter);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s var(--ease), backdrop-filter 0.4s var(--ease), border-color 0.4s var(--ease), padding 0.3s var(--ease);
  border-bottom: 1px solid transparent;
}
.site-header.scrolled {
  background: rgba(14, 23, 48, 0.72);
  backdrop-filter: saturate(160%) blur(16px);
  -webkit-backdrop-filter: saturate(160%) blur(16px);
  border-bottom-color: rgba(255,255,255,0.06);
  padding-top: 12px;
  padding-bottom: 12px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  height: 48px;
  width: auto;
  filter: brightness(0) invert(1);
  transition: height 0.3s var(--ease);
}
.site-header.scrolled .brand-mark { height: 38px; }
.brand-text {
  display: flex;
  flex-direction: column;
  gap: 4px;
  line-height: 1;
}
.brand-text .main {
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 0.04em;
}
.brand-text .branch {
  color: var(--gold);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.24em;
}

.nav-cta {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--navy);
  background: var(--gold);
  padding: 10px 18px;
  border-radius: 999px;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 0 4px rgba(245, 200, 75, 0.18);
}

/* ==========================================================
   HERO
   ========================================================== */
.hero {
  min-height: 100vh;
  padding: 140px var(--gutter) 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(245, 200, 75, 0.08), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(200, 32, 44, 0.06), transparent 70%),
    linear-gradient(180deg, #0E1730 0%, #1A2847 55%, #0E1730 100%);
}

/* Subtle dance-floor grid hint */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at 50% 45%, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 45%, black 30%, transparent 75%);
  pointer-events: none;
}

/* Faint corner accent lines */
.hero::after {
  content: "";
  position: absolute;
  inset: 80px;
  border: 1px solid rgba(245, 200, 75, 0.06);
  pointer-events: none;
}

.hero-inner {
  position: relative;
  max-width: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.hero-sub-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.hero-sub-stack .urgent {
  font-size: clamp(20px, 1.9vw, 28px);
  color: var(--gold);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 6px;
  text-shadow: 0 0 30px rgba(245, 200, 75, 0.25);
}
.hero-event-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin-top: 32px;
  padding-top: 36px;
  border-top: 1px solid rgba(245, 200, 75, 0.18);
  position: relative;
}
.hero-event-block::before {
  content: "";
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 1px;
  background: var(--gold);
}

.hero-label {
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.hero-label::before {
  content: "—";
  color: var(--red);
}

.hero-title {
  font-size: clamp(52px, 8.5vw, 132px);
  line-height: 0.98;
  letter-spacing: -0.04em;
  font-weight: 800;
  margin: 0;
}
.hero-title em {
  font-style: normal;
  color: var(--gold);
}

.hero-sub {
  font-size: clamp(17px, 1.4vw, 21px);
  color: var(--gray-soft);
  max-width: 38ch;
  line-height: 1.7;
  margin: 0;
}

/* Event tag (red pill — stronger emphasis) */
.event-tag {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--red);
  color: white;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.12em;
  border-radius: 2px;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 0 0 6px rgba(200, 32, 44, 0.12),
    0 14px 40px -10px rgba(200, 32, 44, 0.55);
  animation: event-blink 2.4s ease-in-out infinite;
}
.event-tag .bolt {
  font-size: 15px;
  line-height: 1;
  filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
}
.event-tag::after {
  content: "";
  width: 7px; height: 7px;
  border-radius: 50%;
  background: white;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes event-blink {
  0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 6px rgba(200,32,44,0.12), 0 14px 40px -10px rgba(200,32,44,0.55); }
  50% { box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 0 0 10px rgba(200,32,44,0.22), 0 14px 60px -8px rgba(200,32,44,0.75); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.event-headline {
  font-size: clamp(48px, 7vw, 88px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.95;
  color: var(--gold);
  margin: 0;
  text-shadow: 0 0 60px rgba(245, 200, 75, 0.25);
}

.price-row {
  display: flex;
  align-items: baseline;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 8px 0 4px;
}
.price-strike {
  font-size: clamp(18px, 1.5vw, 22px);
  color: var(--gray);
  text-decoration: line-through;
  text-decoration-thickness: 1.5px;
  text-decoration-color: var(--red);
  font-weight: 500;
  letter-spacing: -0.01em;
}
.price-new {
  font-size: clamp(16px, 1.3vw, 18px);
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.price-new::before {
  content: "→";
  margin-right: 8px;
  opacity: 0.7;
}

/* Countdown */
.countdown {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  background: rgba(200, 32, 44, 0.08);
  border: 1px solid rgba(200, 32, 44, 0.35);
  border-radius: 4px;
  margin-top: 8px;
  position: relative;
}
.countdown::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
}
.countdown-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--red);
  text-transform: uppercase;
}
.countdown-clock {
  display: flex;
  gap: 8px;
  align-items: baseline;
  font-variant-numeric: tabular-nums;
}
.cd-cell {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.cd-cell .num {
  font-size: 22px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.02em;
  min-width: 28px;
  text-align: right;
}
.cd-cell .unit {
  font-size: 11px;
  color: var(--gray-soft);
  letter-spacing: 0.04em;
}
.cd-cell + .cd-cell::before {
  content: ":";
  color: rgba(245,200,75,0.4);
  margin: 0 4px 0 -4px;
  font-weight: 700;
}
.countdown.ended {
  background: rgba(200, 32, 44, 0.16);
}
.countdown.ended .countdown-clock {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.01em;
}

.event-sub {
  font-size: 14px;
  color: var(--gray-soft);
  letter-spacing: 0.04em;
  margin: 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.event-sub span:not(:last-child)::after {
  content: "·";
  margin-left: 8px;
  color: var(--gold);
  opacity: 0.5;
}

/* CTA red — hero event */
.cta-red {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 20px 36px;
  background: var(--red);
  color: white;
  border-radius: 999px;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.005em;
  margin-top: 6px;
  transition: transform 0.3s var(--ease), box-shadow 0.4s var(--ease);
  box-shadow: 0 0 0 0 rgba(200, 32, 44, 0.4);
}
.cta-red:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 60px 4px rgba(200, 32, 44, 0.35), 0 0 0 6px rgba(200, 32, 44, 0.12);
}
.cta-red .arrow { transition: transform 0.3s var(--ease); }
.cta-red:hover .arrow { transform: translateX(4px); }
.cta-red .pipe { opacity: 0.5; margin: 0 4px; }

/* CTA */
.cta-gold {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 20px 36px;
  background: var(--gold);
  color: var(--navy);
  border-radius: 999px;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
  position: relative;
  transition: transform 0.3s var(--ease), box-shadow 0.4s var(--ease);
  box-shadow: 0 0 0 0 rgba(245, 200, 75, 0.4);
}
.cta-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 60px 4px rgba(245, 200, 75, 0.35), 0 0 0 6px rgba(245, 200, 75, 0.1);
}
.cta-gold .arrow {
  transition: transform 0.3s var(--ease);
}
.cta-gold:hover .arrow {
  transform: translateX(4px);
}

.cta-kakao {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 20px 32px;
  background: #FEE500;
  color: #191600;
  border-radius: 999px;
  font-weight: 700;
  font-size: 16px;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
.cta-kakao:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -8px rgba(254, 229, 0, 0.4);
}

/* Scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.scroll-hint::after {
  content: "";
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, rgba(245,200,75,0.6), transparent);
  animation: scroll-line 2s var(--ease) infinite;
}
@keyframes scroll-line {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  51% { transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

/* ==========================================================
   PROBLEMS · 2x2
   ========================================================== */
.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--navy-line);
  border: 1px solid var(--navy-line);
}
.problem-card {
  background: var(--navy);
  padding: 48px;
  transition: background 0.4s var(--ease);
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-height: 240px;
}
.problem-card:hover {
  background: var(--navy-surface);
}
.problem-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.problem-text {
  font-size: clamp(20px, 1.6vw, 26px);
  font-weight: 600;
  line-height: 1.45;
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}

/* ==========================================================
   RESPONSIBILITY · 4-col cards
   ========================================================== */
.resp-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.resp-card {
  padding: 36px 28px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  transition: border-color 0.3s var(--ease), transform 0.4s var(--ease);
  position: relative;
  min-height: 260px;
}
.resp-card:hover {
  border-color: var(--gold);
  transform: translateY(-4px);
}
.resp-cadence {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--gold);
  padding: 6px 10px;
  border: 1px solid rgba(245, 200, 75, 0.35);
  border-radius: 2px;
  align-self: flex-start;
}
.resp-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.35;
  margin: 0;
}
.resp-desc {
  font-size: 14px;
  color: var(--gray-soft);
  line-height: 1.6;
  margin: 0;
  margin-top: auto;
}

/* ==========================================================
   DIAGNOSIS · paper section
   ========================================================== */
.section.paper {
  background: var(--paper);
  color: var(--navy);
}
.section.paper .lead { color: #5A6478; }

.diagnosis-layout {
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 80px;
  align-items: center;
}

/* Diagnosis report card (locked preview) */
.report-frame {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  box-shadow:
    0 2px 0 rgba(0,0,0,0.04),
    0 40px 80px -30px rgba(26, 40, 71, 0.45);
  transform: perspective(2000px) rotateY(-2deg) rotateX(0.5deg);
  transition: transform 0.6s var(--ease);
}
.report-frame:hover { transform: perspective(2000px) rotateY(-0.5deg) rotateX(0deg); }

.report-card {
  background: white;
  border: 1px solid var(--paper-line);
  padding: 36px;
  font-size: 12px;
  color: var(--navy);
  position: relative;
}
.report-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 16px;
  border-bottom: 1.5px solid var(--navy);
}
.report-logo {
  height: 22px;
  width: auto;
}
.report-meta {
  text-align: right;
  font-size: 10px;
  line-height: 1.7;
  color: #5A6478;
}
.report-meta b { color: var(--navy); }
.report-meta .red { color: var(--red); font-weight: 700; }
.report-tag {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--red);
  margin-top: 20px;
}
.report-tag::before { content: "— "; }
.report-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin: 6px 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.report-title .chip-track {
  font-size: 10px;
  background: var(--navy);
  color: white;
  padding: 6px 12px;
  border-radius: 2px;
  letter-spacing: 0.1em;
  font-weight: 600;
}
.report-fields {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 18px 22px;
  background: var(--paper);
  border-radius: 4px;
  margin-bottom: 28px;
}
.report-fields .label {
  font-size: 9px;
  letter-spacing: 0.18em;
  color: #5A6478;
  margin-bottom: 4px;
}
.report-fields .value {
  font-size: 13px;
  font-weight: 700;
}
.report-section-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--navy);
  font-weight: 700;
  margin-bottom: 16px;
}
.report-section-label::before {
  content: "— ";
  color: var(--red);
}

/* Radar chart wrapper */
.report-chart-row {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 24px;
  align-items: center;
  margin-bottom: 24px;
}
.radar { width: 100%; height: auto; }
.score-list { display: flex; flex-direction: column; gap: 10px; }
.score-row {
  display: grid;
  grid-template-columns: 56px 1fr 28px 38px;
  gap: 10px;
  align-items: center;
  font-size: 11px;
}
.score-row .name { font-weight: 600; }
.score-bar { height: 6px; background: var(--paper); border-radius: 999px; overflow: hidden; }
.score-fill { height: 100%; background: var(--gold); border-radius: 999px; }
.score-val { font-weight: 700; font-size: 12px; text-align: right; }
.score-chip {
  font-size: 9px;
  font-weight: 700;
  background: var(--gold);
  color: var(--navy);
  padding: 3px 7px;
  border-radius: 2px;
  text-align: center;
}
.score-chip.fair { background: #E5DECE; }

.report-avg {
  border-top: 1px dashed var(--paper-line);
  padding-top: 12px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 12px;
}
.report-avg .label { font-size: 11px; color: #5A6478; }
.report-avg .big {
  font-size: 22px;
  font-weight: 800;
  color: var(--red);
}

/* Selective blur on answer/value text only */
.blur-value {
  filter: blur(5px);
  user-select: none;
  pointer-events: none;
  letter-spacing: 0;
}

/* Summary grid (4 fact boxes) */
.report-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.report-summary-box {
  border-radius: 4px;
  padding: 12px 16px;
  background: var(--paper);
  border-left: 3px solid var(--paper-line);
  position: relative;
  min-height: 64px;
}
.report-summary-box.dark {
  background: var(--navy);
  color: white;
  border-left-color: var(--gold);
}
.report-summary-box.warn { border-left-color: var(--red); }
.report-summary-box .sbox-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--red);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.report-summary-box.dark .sbox-label { color: var(--gold); }
.report-summary-box .sbox-value {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.005em;
}

.report-quote {
  background: var(--paper);
  padding: 14px 18px;
  border-left: 3px solid var(--navy);
  font-size: 11px;
  line-height: 1.7;
  margin: 8px 0 18px;
  border-radius: 0 4px 4px 0;
  font-style: italic;
}

/* Prescription dark band */
.report-presc {
  background: var(--navy);
  color: white;
  border-radius: 4px;
  padding: 16px 18px;
  margin-top: 6px;
}
.report-presc-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(245, 200, 75, 0.18);
}
.report-presc-head .title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--gold);
}
.report-presc-head .num {
  font-size: 9px;
  color: var(--gray-soft);
  font-family: 'JetBrains Mono', monospace;
}
.report-presc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.report-presc-field {
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 3px;
}
.report-presc-field .label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--gold);
  margin-bottom: 4px;
}
.report-presc-field .value {
  font-size: 11px;
  font-weight: 600;
  color: white;
}

/* Centered lock badge (floats over the report card) */
.report-lock-badge {
  position: absolute;
  left: 50%;
  top: 56%;
  transform: translate(-50%, -50%);
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 22px 32px;
  background: rgba(14, 23, 48, 0.88);
  border: 1px solid rgba(245, 200, 75, 0.45);
  border-radius: 4px;
  backdrop-filter: blur(2px);
  box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5), 0 0 0 6px rgba(245, 200, 75, 0.04);
  pointer-events: none;
  min-width: 280px;
}
.report-lock-icon {
  width: 56px; height: 56px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--gold);
  background: var(--navy);
  box-shadow: 0 0 0 6px rgba(245, 200, 75, 0.06);
}
.report-lock-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.26em;
  color: var(--gold);
  text-transform: uppercase;
}
.report-lock-headline {
  font-size: 14px;
  font-weight: 600;
  color: white;
  letter-spacing: -0.01em;
  text-align: center;
  margin: 0;
  line-height: 1.5;
}

/* Diagnosis right column copy */
.diag-copy { display: flex; flex-direction: column; gap: 28px; }
.diag-list { display: flex; flex-direction: column; gap: 20px; margin: 8px 0 0; }
.diag-item {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 18px;
  align-items: baseline;
}
.diag-item .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--red);
  font-weight: 700;
}
.diag-item h4 {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 6px;
  letter-spacing: -0.02em;
}
.diag-item p {
  font-size: 14px;
  color: #5A6478;
  margin: 0;
  line-height: 1.6;
}

.gold-callout {
  border: 1px solid var(--gold);
  background: linear-gradient(180deg, rgba(245,200,75,0.08), rgba(245,200,75,0.02));
  padding: 22px 28px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 17px;
  letter-spacing: -0.01em;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 14px;
}
.gold-callout::before {
  content: "";
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 4px rgba(245, 200, 75, 0.2);
}

/* ==========================================================
   DIAGNOSIS STEPS · 3-col
   ========================================================== */
.steps-3 {
  display: grid;
  grid-template-columns: 1fr 28px 1fr 28px 1fr;
  gap: 0;
  align-items: stretch;
}
.steps-3 .step-arrow {
  display: grid;
  place-items: center;
  color: var(--gold);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.04em;
  position: relative;
}
.steps-3 .step-arrow::before {
  content: "";
  position: absolute;
  left: -12px; right: -12px;
  top: 50%;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 3px, transparent 3px, transparent 8px);
  opacity: 0.45;
}
.steps-3 .step-arrow .chev {
  position: relative;
  background: var(--navy);
  padding: 6px;
  border-radius: 50%;
  border: 1px solid rgba(245, 200, 75, 0.3);
  display: grid;
  place-items: center;
  width: 28px; height: 28px;
}
.step-card {
  padding: 40px 32px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  position: relative;
  transition: border-color 0.3s var(--ease), transform 0.4s var(--ease);
}
.step-card:hover { border-color: var(--gold); transform: translateY(-4px); }
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: -0.04em;
  line-height: 1;
}
.step-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
}
.step-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.step-list li {
  font-size: 14px;
  color: var(--gray-soft);
  line-height: 1.6;
  padding-left: 16px;
  position: relative;
}
.step-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 10px;
  width: 6px; height: 1px;
  background: var(--gold);
}

.fine-print {
  font-size: 13px;
  color: var(--gray);
  letter-spacing: 0.02em;
  margin: 40px 0 0;
  text-align: center;
}
.fine-print::before { content: "* "; color: var(--gold); }

.section-note {
  text-align: center;
  margin: 40px 0 0;
  font-size: 15px;
  color: var(--gray-soft);
  letter-spacing: -0.005em;
}
.section-note .accent {
  color: var(--gold);
  font-weight: 600;
}

/* ==========================================================
   TRAINERS · 4-col, icons only, no faces/names
   ========================================================== */
.trainer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--navy-line);
  border: 1px solid var(--navy-line);
}
.trainer-card {
  background: var(--navy);
  padding: 44px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-height: 280px;
  transition: background 0.4s var(--ease);
}
.trainer-card:hover { background: var(--navy-surface); }
.trainer-icon {
  width: 56px;
  height: 56px;
  border: 1px solid var(--gold);
  border-radius: 2px;
  display: grid;
  place-items: center;
  color: var(--gold);
  position: relative;
}
.trainer-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.5;
  letter-spacing: -0.015em;
  margin: 0;
  text-wrap: balance;
}
.trainer-meta {
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: auto 0 0;
}

/* ==========================================================
   ENROLL STEPS · 4 horizontal with arrows
   ========================================================== */
.enroll-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  position: relative;
}
.enroll-card {
  padding: 32px 26px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  transition: border-color 0.3s var(--ease), transform 0.4s var(--ease);
}
.enroll-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.enroll-card:not(:last-child)::after {
  content: "→";
  position: absolute;
  right: -22px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  font-size: 18px;
  font-weight: 700;
  z-index: 2;
}
.enroll-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.enroll-title {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
}
.enroll-desc {
  font-size: 13px;
  color: var(--gray-soft);
  margin: 0;
  line-height: 1.55;
}

/* ==========================================================
   STUDIO GALLERY
   ========================================================== */
.gallery-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  grid-template-rows: 240px 240px;
  gap: 12px;
}
.gallery-cell {
  position: relative;
  overflow: hidden;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  border-radius: 2px;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  transition: border-color 0.3s var(--ease);
}
.gallery-cell:hover { border-color: var(--gold); }
.gallery-cell.tall { grid-row: 1 / 3; }
.gallery-cell.wide { grid-column: span 2; }

/* Placeholder pattern */
.ph {
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      45deg,
      rgba(245, 200, 75, 0.04) 0,
      rgba(245, 200, 75, 0.04) 1px,
      transparent 1px,
      transparent 14px
    ),
    radial-gradient(ellipse at center, rgba(245,200,75,0.04), transparent 70%),
    var(--navy-deep);
}
.gallery-label {
  position: relative;
  padding: 18px 22px;
  z-index: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--gold);
}
.gallery-label .ko {
  display: block;
  color: var(--white);
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 14px;
  letter-spacing: -0.01em;
  margin-top: 4px;
  font-weight: 600;
}

/* ==========================================================
   LOCATION
   ========================================================== */
.location-layout {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 60px;
  align-items: center;
}
.map-mock {
  height: 460px;
  border-radius: 4px;
  border: 1px solid var(--navy-line);
  background: var(--navy-deep);
  position: relative;
  overflow: hidden;
}
.map-mock::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245, 200, 75, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245, 200, 75, 0.06) 1px, transparent 1px);
  background-size: 60px 60px;
}
.map-mock::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 55% 50%, rgba(26, 40, 71, 0) 30%, rgba(14, 23, 48, 0.95));
}
.map-pin {
  position: absolute;
  left: 55%; top: 50%;
  transform: translate(-50%, -100%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.map-pin .dot {
  width: 14px; height: 14px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 0 6px rgba(245, 200, 75, 0.25), 0 0 0 14px rgba(245, 200, 75, 0.1);
  animation: pin-pulse 2.2s var(--ease) infinite;
}
@keyframes pin-pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(245,200,75,0.3), 0 0 0 10px rgba(245,200,75,0.12); }
  50% { box-shadow: 0 0 0 8px rgba(245,200,75,0.2), 0 0 0 20px rgba(245,200,75,0.05); }
}
.map-pin .pin-label {
  background: var(--navy);
  border: 1px solid var(--gold);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 2px;
  letter-spacing: 0.1em;
  white-space: nowrap;
}

.location-info { display: flex; flex-direction: column; gap: 28px; }
.info-block { display: flex; flex-direction: column; gap: 6px; }
.info-block .label {
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--gold);
  font-weight: 600;
}
.info-block .value {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1.5;
}
.info-block .sub {
  font-size: 14px;
  color: var(--gray-soft);
}

/* ==========================================================
   FINAL CTA
   ========================================================== */
.final-cta {
  background:
    radial-gradient(ellipse at center, rgba(245,200,75,0.12), transparent 65%),
    linear-gradient(180deg, var(--navy-deep), var(--navy));
  text-align: center;
  padding: 160px var(--gutter);
  position: relative;
  overflow: hidden;
}
.final-cta .ring {
  position: absolute;
  width: 900px; height: 900px;
  border: 1px solid rgba(245, 200, 75, 0.08);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.final-cta .ring.r2 { width: 1400px; height: 1400px; border-color: rgba(245, 200, 75, 0.04); }

.final-inner {
  position: relative;
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
.final-title {
  font-size: clamp(36px, 5.5vw, 72px);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.05;
  margin: 0;
}
.final-title em { font-style: normal; color: var(--gold); }
.final-sub {
  font-size: 17px;
  color: var(--gray-soft);
  margin: 0;
}
.cta-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 16px;
}

/* ==========================================================
   FOOTER
   ========================================================== */
.site-footer {
  padding: 60px var(--gutter) 80px;
  background: var(--navy-deep);
  border-top: 1px solid var(--navy-line);
}
.footer-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 40px;
}
.footer-left .brand-mark { height: 32px; margin-bottom: 14px; }
.footer-left .branch {
  font-size: 12px;
  letter-spacing: 0.22em;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 8px;
}
.footer-left .addr {
  font-size: 13px;
  color: var(--gray-soft);
  letter-spacing: 0.02em;
}
.footer-right {
  text-align: right;
  font-size: 13px;
  color: var(--gray-soft);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.footer-right .ig {
  color: var(--white);
  font-weight: 600;
  font-size: 14px;
}
.footer-right .home {
  color: var(--gray);
  font-size: 12px;
  letter-spacing: 0.04em;
}
.footer-copy {
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--navy-line);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--gray);
  max-width: var(--max);
  margin-left: auto;
  margin-right: auto;
  text-transform: uppercase;
}

/* ==========================================================
   FAQ
   ========================================================== */
.faq-list {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--navy-line);
}
.faq-item {
  border-bottom: 1px solid var(--navy-line);
  transition: background 0.3s var(--ease);
}
.faq-item.open { background: rgba(245, 200, 75, 0.025); }
.faq-q {
  width: 100%;
  text-align: left;
  display: grid;
  grid-template-columns: 56px 1fr 36px;
  gap: 24px;
  align-items: center;
  padding: 28px 8px;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--white);
  cursor: pointer;
  transition: color 0.25s var(--ease);
}
.faq-q .qnum {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.08em;
}
.faq-item.open .faq-q { color: var(--gold); }
.faq-q .toggle {
  position: relative;
  width: 22px; height: 22px;
  justify-self: end;
}
.faq-q .toggle::before, .faq-q .toggle::after {
  content: "";
  position: absolute;
  background: var(--gold);
  transition: transform 0.4s var(--ease), opacity 0.3s var(--ease);
}
.faq-q .toggle::before {
  top: 50%; left: 0;
  width: 22px; height: 1.5px;
  transform: translateY(-50%);
}
.faq-q .toggle::after {
  left: 50%; top: 0;
  width: 1.5px; height: 22px;
  transform: translateX(-50%);
}
.faq-item.open .faq-q .toggle::after {
  transform: translateX(-50%) rotate(90deg);
  opacity: 0;
}
.faq-a {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.45s var(--ease);
}
.faq-item.open .faq-a { grid-template-rows: 1fr; }
.faq-a-inner {
  overflow: hidden;
}
.faq-a-content {
  display: grid;
  grid-template-columns: 56px 1fr 36px;
  gap: 24px;
  padding: 0 8px 32px;
  font-size: 15px;
  color: var(--gray-soft);
  line-height: 1.75;
  letter-spacing: -0.005em;
}
.faq-a-content > div { grid-column: 2; white-space: pre-line; text-wrap: pretty; }

/* ==========================================================
   FORM (inline in final CTA)
   ========================================================== */
.form-card {
  background: var(--paper);
  color: var(--navy);
  border-radius: 6px;
  padding: 56px clamp(28px, 4vw, 60px);
  text-align: left;
  max-width: 720px;
  margin: 16px auto 0;
  border: 1px solid var(--paper-line);
  box-shadow: 0 60px 100px -40px rgba(0,0,0,0.5);
  position: relative;
}
.form-card .form-head {
  text-align: center;
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--paper-line);
}
.form-card .form-head h3 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin: 0 0 12px;
}
.form-card .form-head .sub {
  font-size: 14px;
  color: #5A6478;
  line-height: 1.65;
  margin: 0;
}
.form-card .form-head .sub b { color: var(--red); font-weight: 600; }

.form-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0 18px;
}
.form-divider .label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--gold);
}
.form-divider .label::before { content: "— "; color: var(--red); }
.form-divider .line {
  flex: 1;
  height: 1px;
  background: var(--paper-line);
}

.form-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}
.form-row.split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-row.split > .field { display: flex; flex-direction: column; gap: 8px; }
.field-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.005em;
}
.field-label .req {
  color: var(--red);
  margin-left: 3px;
}
.form-input, .form-select, .form-textarea {
  font-family: inherit;
  font-size: 15px;
  padding: 14px 16px;
  border: 1px solid #C9CFDB;
  background: white;
  border-radius: 4px;
  color: var(--navy);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(26, 40, 71, 0.08);
}
.form-textarea {
  min-height: 110px;
  resize: vertical;
  font-family: inherit;
}
.form-select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%231A2847' stroke-width='1.6'/></svg>");
  background-repeat: no-repeat;
  background-position: right 16px center;
  background-size: 12px;
  padding-right: 40px;
}

.form-checkbox {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 12px;
  align-items: flex-start;
  margin: 24px 0 28px;
  font-size: 13px;
  color: #5A6478;
  line-height: 1.6;
  cursor: pointer;
  user-select: none;
}
.form-checkbox input { display: none; }
.form-checkbox .box {
  width: 22px; height: 22px;
  border: 1.5px solid #C9CFDB;
  border-radius: 3px;
  background: white;
  position: relative;
  transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
}
.form-checkbox input:checked + .box {
  background: var(--navy);
  border-color: var(--navy);
}
.form-checkbox input:checked + .box::after {
  content: "";
  position: absolute;
  left: 6px; top: 2px;
  width: 6px; height: 12px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.form-submit {
  width: 100%;
  background: var(--navy);
  color: white;
  font-size: 16px;
  font-weight: 700;
  padding: 22px 24px;
  border-radius: 4px;
  letter-spacing: -0.005em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  transition: background 0.25s var(--ease), transform 0.25s var(--ease);
}
.form-submit:hover { background: #0F1A30; transform: translateY(-1px); }
.form-submit .arrow { transition: transform 0.3s var(--ease); }
.form-submit:hover .arrow { transform: translateX(4px); }

.form-success {
  text-align: center;
  padding: 40px 20px;
}
.form-success .mark {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--gold);
  display: grid;
  place-items: center;
  color: var(--navy);
  font-size: 32px;
}
.form-success h4 {
  font-size: 24px;
  font-weight: 800;
  margin: 0 0 10px;
  letter-spacing: -0.02em;
}
.form-success p {
  font-size: 14px;
  color: #5A6478;
  margin: 0;
}

/* ==========================================================
   GALLERY images
   ========================================================== */
.gallery-cell .photo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform 0.7s var(--ease), filter 0.4s var(--ease);
  filter: saturate(0.85) brightness(0.85);
}
.gallery-cell:hover .photo {
  transform: scale(1.03);
  filter: saturate(1) brightness(1);
}
.gallery-cell .photo::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(14, 23, 48, 0.7));
}
.gallery-cell .gallery-label {
  z-index: 2;
}

/* ==========================================================
   ILLUSTRATED MAP
   ========================================================== */
.map-illustration {
  height: 460px;
  border-radius: 4px;
  border: 1px solid var(--navy-line);
  background: var(--navy-deep);
  position: relative;
  overflow: hidden;
}
.map-illustration svg { width: 100%; height: 100%; display: block; }
.map-attrib {
  position: absolute;
  bottom: 12px; right: 14px;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.6);
  font-family: 'JetBrains Mono', monospace;
  z-index: 3;
  background: rgba(14, 23, 48, 0.8);
  padding: 6px 10px;
  border-radius: 2px;
  border: 1px solid rgba(245, 200, 75, 0.2);
}

/* Photo-based map (Naver screenshot) */
.map-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.85) brightness(0.92) contrast(1.02);
}
.map-tint {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(14,23,48,0.18) 0%, rgba(14,23,48,0.05) 30%, rgba(14,23,48,0.35) 100%),
    radial-gradient(ellipse at 30% 60%, rgba(245,200,75,0.06), transparent 70%);
  pointer-events: none;
  z-index: 1;
}
.map-badge {
  position: absolute;
  top: 16px; left: 16px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(14, 23, 48, 0.92);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 12px 16px;
  box-shadow: 0 14px 30px -12px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(2px);
}
.map-badge .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
  box-shadow: 0 0 0 4px rgba(245, 200, 75, 0.18);
  animation: pin-pulse 2.2s var(--ease) infinite;
}
.map-badge .t1 {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: var(--gold);
  line-height: 1.2;
}
.map-badge .t2 {
  font-size: 11px;
  color: var(--gray-soft);
  letter-spacing: 0.02em;
  margin-top: 2px;
}

/* ==========================================================
   MAGNETIC HOVER  (no following dot — element-side scale)
   ========================================================== */
.magnetic {
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
              box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}
.magnetic.hot {
  box-shadow: 0 0 0 1px rgba(245, 200, 75, 0.25), 0 14px 40px -14px rgba(245, 200, 75, 0.35);
}
.cta-gold.magnetic.hot,
.cta-red.magnetic.hot,
.nav-cta.magnetic.hot,
.form-submit.magnetic.hot {
  box-shadow: 0 0 0 2px rgba(245, 200, 75, 0.2), 0 0 60px 4px rgba(245, 200, 75, 0.35);
}
.cta-red.magnetic.hot {
  box-shadow: 0 0 0 2px rgba(200, 32, 44, 0.25), 0 0 60px 4px rgba(200, 32, 44, 0.35);
}
@media (hover: none), (pointer: coarse) {
  .magnetic { transition: none; transform: none !important; }
}

/* Animated underline on text links */
.link-underline { position: relative; display: inline-block; }
.link-underline::after {
  content: "";
  position: absolute;
  left: 0; bottom: -3px;
  width: 100%; height: 1px;
  background: currentColor;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.45s var(--ease);
}
.link-underline:hover::after { transform: scaleX(1); }

/* ==========================================================
   SECTION DIVIDER LINE (gold sweep)
   ========================================================== */
.section-divider {
  height: 1px;
  background: var(--navy-line);
  position: relative;
  overflow: hidden;
  margin: 0 var(--gutter);
  max-width: var(--max);
  margin-left: auto;
  margin-right: auto;
}
.section-divider::after {
  content: "";
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transform: translateX(-100%);
  transition: transform 1.4s var(--ease);
}
.section-divider.in::after { transform: translateX(100%); }

/* ==========================================================
   HEADLINE letter fade-in
   ========================================================== */
.split-headline { display: inline; }
.split-headline .ch {
  display: inline-block;
  opacity: 0;
  transform: translateY(0.4em);
  transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
}
.split-headline.in .ch {
  opacity: 1;
  transform: none;
}
